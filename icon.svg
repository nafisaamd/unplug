<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark rounded background -->
  <rect width="512" height="512" rx="110" fill="#2C2C2A"/>
  <!-- Cream inner surface -->
  <rect x="28" y="28" width="456" height="456" rx="88" fill="#FFFDF8"/>
  <!-- Soft decorative blobs -->
  <circle cx="110" cy="148" r="68" fill="#F0997B" opacity="0.18"/>
  <circle cx="410" cy="370" r="52" fill="#1D9E75" opacity="0.15"/>
  <circle cx="405" cy="110" r="38" fill="#EF9F27" opacity="0.20"/>
  <!-- "Un" — serif regular -->
  <text x="68" y="308"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="156" font-weight="400"
    fill="#2C2C2A" letter-spacing="-3">Un</text>
  <!-- "plug" — serif bold italic coral -->
  <text x="234" y="308"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="156" font-weight="700" font-style="italic"
    fill="#F0997B" letter-spacing="-5">plug</text>
  <!-- Underline accent -->
  <rect x="220" y="328" width="210" height="12" rx="6" fill="#F0997B" opacity="0.35"/>
</svg>
